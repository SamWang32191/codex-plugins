name: Plugin versions

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sdkman-script-contracts:
    name: SDKMAN JDK script contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run SDKMAN JDK contract tests
        run: bash test/sdkman-switch-jdk-contract.sh

  verify:
    name: Verify on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 22
          - 24
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run version-management tests
        run: node --test test/bump-plugin-versions.test.mjs
      - name: Check lockstep plugin versions
        run: node scripts/bump-plugin-versions.mjs --check
